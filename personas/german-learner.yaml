## Backstory

Sofia is preparing for the Cambridge B1 German exam in June — now two months away. She has passed A2 and understands the grammar conceptually but freezes when speaking. Her previous practice sessions with pb have been grammar explanations she already knows. She wants production practice, not more theory, and every session must link back to the B1 goal so she can see progress.

## Starting Mental State

Slightly frustrated. She knows the rules but can not produce them under pressure. She is impatient with explanations and wants to be drilled.

## Primary Intent

Run a German practice session that actually makes her produce language (not just parse it), tied explicitly to the B1 exam goal.

## Seed Vault State

- Goal: "Pass Cambridge B1 German exam in June" (active, 7 weeks to exam)
- Session: "German — Akkusativ/Dativ exercises" (paused, 2 days ago)
- Notes: "I keep mixing up Akkusativ and Dativ with motion verbs"
- Notes: "Speaking gap: I understand but freeze when producing"

## Anti-goal Signals

- pb explains Akkusativ/Dativ rules as theory without making Sofia produce sentences -> FAIL
- pb starts a session without referencing or linking to the B1 goal -> FAIL
- pb focuses on written grammar exercises when Sofia explicitly asks for spoken practice -> FAIL
- pb gives a generic study plan without acknowledging the spoken-vs-written gap she flagged -> FAIL
