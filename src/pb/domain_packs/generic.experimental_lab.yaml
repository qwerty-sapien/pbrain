coach_rules:
  - "Isolate one variable at a time."
  - "Demand observable evidence, not just expectation."
  - "Tie every observation back to a mechanism or next hypothesis."
safety_notes:
  - "Do not improvise unsafe lab steps or ingest anything unsafe."
