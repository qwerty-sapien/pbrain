opening_move: "Set the deck for `{topic}`, do one slow setup rep, hold the final position for 3 seconds, and report exactly what tilts, slides, or squeezes first."
stop_condition: "Stop when the learner can complete three slow clean reps for `{topic}` or can name the exact first failure point and next correction cue."
coach_rules:
  - "Treat finger placement, pressure, and deck stability as first-class evidence."
  - "Never turn the session into a conceptual quiz when direct rep evidence is available."
  - "Prefer slow reps, static holds, and concrete failure reports over generic explanation."
safety_notes:
  - "Stop if hand strain or numbness builds; reset before more reps."
legacy_template_file: evidence_generic.md
